name: Build cmcc_xr30-emmc annawrt 24.10 kernel 6.6.95 actions.

on:
  workflow_dispatch:
    inputs:
      restore_config:
        description: 'Restore Configuration. 🇯🇵 設定を復元'
        type: boolean
        default: false
      boost_wifi_5g:
        description: 'Boost Wi-Fi 5G Signal. 🇯🇵 5G信号の増幅'
        type: boolean
        default: false
      upload_firmware:
        description: 'Upload to Artifacts... 🇯🇵 Artifactに保存'
        type: boolean
        default: false
      upload_release:
        description: 'Upload to Releases.... 🇯🇵 Releaseに公開'
        type: boolean
        default: false
      telegram_notify:
        description: 'Telegram Notification. 🇯🇵 Telegram通知'
        type: boolean
        default: true
      clean_ccache:
        description: 'Clean all old CCACHE.. 🇯🇵 CCACHEに削除'
        required: false
        type: boolean
        default: false
  schedule:
    - cron: '0 19 * * 0'
    
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # annawrt 2410
  PONLY2410_K66_REPO_LINK:              ${{ secrets.PONLY2410_K66_REPO_LINK }}
  PONLY2410_K66_REPO_TREE:              ${{ secrets.PONLY2410_K66_REPO_TREE }}
  PONLY2410_K66_REPO_HEAD:              ${{ secrets.PONLY2410_K66_REPO_HEAD }}
  PONLY2410_K66_REPO_DIFF:              ${{ secrets.PONLY2410_K66_REPO_DIFF }}
  # cmcc-xr30-emmc
  CMCC_XR30_EMMC_PONLY2410_K66_PATCHES: ${{ secrets.CMCC_XR30_EMMC_PONLY2410_K66_PATCHES }}
  CMCC_XR30_EMMC_PONLY2410_K66_PROFILE: ${{ secrets.CMCC_XR30_EMMC_PONLY2410_K66_PROFILE }}
  CMCC_XR30_EMMC_PONLY2410_K66_ARCHIVE: ${{ secrets.CMCC_XR30_EMMC_PONLY2410_K66_ARCHIVE }}
  # token
  GITHUB_TOKEN:                         ${{ secrets.ACCESS_TOKEN }}
  ACCESS_TOKEN:                         ${{ secrets.ACCESS_TOKEN }}
  DEBIAN_FRONTEND:                      noninteractive
  # feeds source & check sha512sum
  ADD_EXTRA_SOURCE:                     ${{ secrets.ADD_EXTRA_SOURCE }}
  ACCESS_SHA512SUM:                     ${{ secrets.ACCESS_SHA512SUM }}
  ACCESS_REPACKAGE:                     ${{ secrets.ACCESS_REPACKAGE }}
  # luci & packages repo
  PLUGIN_REPO_SLUG:                     ${{ secrets.PLUGIN_REPO_SLUG }}
  PLUGIN_REPO_HEAD:                     ${{ secrets.PLUGIN_REPO_HEAD }}
  PLUGIN_REPO_FLOW:                     ${{ secrets.PLUGIN_REPO_FLOW }}
  # cmcc color sytle for argon
  ARGON_THEME_CMCC:                     ${{ secrets.ARGON_THEME_CMCC }}
  # telegram bot
  TELEGRAM_BOT_KEY:                     ${{ secrets.TELEGRAM_BOT_KEY }}
  TELEGRAM_CHAT_ID:                     ${{ secrets.TELEGRAM_CHAT_ID }}
  # input status
  INPUT_RESTORE:                        ${{ github.event.inputs.restore_config }}
  INPUT_BOOST5G:                        ${{ github.event.inputs.boost_wifi_5g }}
  INPUT_ARTIFACT:                       ${{ github.event.inputs.upload_firmware }}
  INPUT_RELEASE:                        ${{ github.event.inputs.upload_release }}
  INPUT_NOTIFY:                         ${{ github.event.inputs.telegram_notify }}
  INPUT_CLEANCACHE:                     ${{ github.event.inputs.clean_ccache }}
  # hardware & repo info
  DEVICE_NAME:                          CMCC_XR30-eMMC
  TARGET_CHIP:                          mt7981b
  TARGET_DISK:                          8GB_eMMC
  SOURCE_CODE:                          padavanonly
  KERNEL_VERS:                          kernel_6.6.95
  OUTPUT_FILE:                          annawrt-24.10-k6.6-mt7981b-cmcc_xr30-emmc-sysupgrade
  TZ: "Asia/Tokyo"

jobs:
  build:
    runs-on: ubuntu-22.04

    permissions:
      contents: write

    steps:
    - name: Sync and Wait for Plugin Repo (プラグインリポジトリの同期と待機)
      run: |
        LAST_TS=$(date -d $(gh run list -w "$PLUGIN_REPO_FLOW" -R "$PLUGIN_REPO_SLUG" -s success --limit 1 --json updatedAt -q '.[0].updatedAt // "1970-01-01"') +%s)
        DIFF=$(( ($(date +%s) - LAST_TS) / 3600 ))

        if [ "$DIFF" -ge 24 ]; then
          echo "⚠️ Last sync was ${DIFF}h ago. Triggering..."
          gh workflow run "$PLUGIN_REPO_FLOW" -R "$PLUGIN_REPO_SLUG" -r "$PLUGIN_REPO_HEAD"
          
          for i in {1..30}; do
            sleep 20
            RUN_ID=$(gh run list -w "$PLUGIN_REPO_FLOW" -R "$PLUGIN_REPO_SLUG" --limit 1 --json databaseId,status -q 'map(select(.status != "completed")) | .[0].databaseId')
            [[ -n "$RUN_ID" && "$RUN_ID" != "null" ]] && break
          done

          [[ -z "$RUN_ID" ]] && echo "❌ Timeout" && exit 1
          gh run watch "$RUN_ID" -R "$PLUGIN_REPO_SLUG" --exit-status
        else
          echo "✅ Recently synced (${DIFF}h ago). Skipping."
        fi

    - name: Checkout (チェックアウト)
      uses: actions/checkout@main
      with:
        fetch-depth: 0

    - name: Free Disk Space (ディスク空き容量の確保)
      uses: easimon/maximize-build-space@master
      with: 
        root-reserve-mb: 8192
        swap-size-mb: 1

    - name: Check Server Performance (サーバー性能の確認)
      run: |
        echo "⚠️注意⚠️"
        echo "サーバーのリソースは有限です。プラグインの過剰な選択はCPU高負荷の原因となります。"
        echo -e "既知のCPUモデル（降順）: 7763，8370C，8272CL，8171M，E5-2673\n"
        echo "-------------------------CPU 情報---------------------------"
        echo "CPUの物理数  : $(cat /proc/cpuinfo | grep "physical id" | sort | uniq | wc -l)"
        echo "CPUコア数    : $(nproc)"
        echo -e "CPUモデル情報:$(cat /proc/cpuinfo | grep -m1 name | awk -F: '{print $2}')\n"
        echo "------------------------メモリ情報--------------------------"
        echo "メモリの詳細:"
        echo -e "$(sudo lshw -short -C memory | grep GiB)\n"
        echo "---------------------ハードディスク情報---------------------"
        echo "ディスク容量: $(ls /dev/sd* | grep -v [1-9] | wc -l)" && df -hT

    - name: Initialize Environment (環境の初期化)
      run: |
        sudo -E apt -yqq update
        sudo -E apt -yqq install zip rename dos2unix libfuse-dev python3-netifaces libcrypt-dev libncurses5-dev cargo
        sudo bash -c 'bash <(curl -sL https://build-scripts.immortalwrt.org/init_build_environment.sh)'
        rustup target add aarch64-unknown-linux-musl
        sudo timedatectl set-timezone "$TZ"
        sudo chown $USER:$GROUPS $GITHUB_WORKSPACE
        git config --global url."https://$ACCESS_TOKEN@github.com/0xACE8/".insteadOf "https://github.com/0xACE8/"
        git config --global core.compression 0

    - name: Clone Source Code (ソースコードのクローン)
      working-directory: ./
      run: |
        df -hT $PWD
        git clone --depth 1 $PONLY2410_K66_REPO_LINK -b $PONLY2410_K66_REPO_HEAD openwrt
        # Remove China Mirrors (中国国内ミラーの削除)
        [ -f "scripts/projectsmirrors.json" ] && sed -i '/.cn\//d; /tencent/d; /aliyun/d' scripts/projectsmirrors.json && rm -rf files
        # Prepare Cache Key (キャッシュキーの准备)
        mkdir -p ${{ github.workspace }}/openwrt/.ccache
        echo "CACHE_MONTH=$(date +%Y%m)" >> $GITHUB_ENV
        [[ "$INPUT_CLEANCACHE" == "true" ]] && echo "CLEAN_MARK=_clean_$(date +%s)" >> $GITHUB_ENV || echo "CLEAN_MARK=" >> $GITHUB_ENV

    - name: Cache Toolchain (ツールチェーンのキャッシュ)
      uses: stupidloud/cachewrtbuild@main
      with:
        ccache: true
        toolchain: true
        skip: true
        mixkey: MT7981b-[${{ env.CACHE_MONTH }}]-[${{ env.SOURCE_CODE }}]-[${{ secrets.PONLY2410_K66_REPO_TREE }}]-[${{ secrets.PONLY2410_K66_REPO_HEAD }}]-[${{ env.KERNEL_VERS }}]-[${{ env.CLEAN_MARK }}]
        prefix: ${{ github.workspace }}/openwrt

    - name: Cache dl Directory (dlディレクトリのキャッシュ)
      uses: actions/cache@v3
      with:
        path: openwrt/dl
        key: ${{ runner.os }}-openwrt-dl-v3-${{ hashFiles('**/feeds.conf.default') }}
        restore-keys: |
          ${{ runner.os }}-openwrt-dl-v3-

    - name: Surgical Clean Go Cache (Goキャッシュの物理削除)
      run: |
        rm -rf openwrt/dl/go-mod-cache
        mkdir -p openwrt/dl/go-mod-cache

    - name: Update & Install Feeds (フィードの更新とインストール)
      working-directory: ./openwrt
      run: |
        ${{ secrets.CMCC_XR30_EMMC_PONLY2410_K66_PATCHES }}
        ${{ secrets.ADD_EXTRA_SOURCE }}
        ./scripts/feeds update -a
        rm -rf feeds/packages/lang/golang && git clone https://github.com/sbwml/packages_lang_golang -b 25.x feeds/packages/lang/golang
        ./scripts/feeds install -a

    - name: Boost Wi-Fi 5G Signal
      if: env.INPUT_BOOST5G == 'true'
      working-directory: ./openwrt
      run: |
        ${{ secrets.BOOST_5G_TO_25DBM }}

    - name: Load Custom Configuration (カスタム設定の読み込み)
      working-directory: ./openwrt
      id: loadconfig
      run: |
        set +x
        cat <<'EOF' > .config
        ${{ secrets.CMCC_XR30_EMMC_PONLY2410_K66_PROFILE }}
        EOF
        set -x
        ${{ secrets.PONLY2410_K66_REPO_DIFF }}
        ${{ secrets.ARGON_THEME_CMCC }}

        # Check CCache Status
        ccache -s

    - name: Restore Config Archive (設定アーカイブの復元)
      if: steps.loadconfig.outcome == 'success' && env.INPUT_RESTORE == 'true'
      working-directory: ./openwrt
      run: |
        ${{ secrets.CMCC_XR30_EMMC_PONLY2410_K66_ARCHIVE }}
        echo "OUTPUT_FILE=annawrt-24.10-k6.6-mt7981b-cmcc_xr30-emmc-configured-sysupgrade" >> $GITHUB_ENV

    - name: Download Packages (パッケージのダウンロード)
      if: steps.loadconfig.outcome == 'success' && !cancelled()
      working-directory: ./openwrt
      id: package
      run: |
        make defconfig
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile Firmware (ファームウェアのコンパイル)
      working-directory: ./openwrt
      id: compile
      run: |
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 V=s
        echo "FILE_DATE=$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: Verify CCache Settings
      if: steps.compile.outcome == 'success'
      run: |
        # Update Variables (変数の更新)
        echo "OUTPUT_FILE=${OUTPUT_FILE}_${FILE_DATE}" >> $GITHUB_ENV
        ccache -p
        ccache -s

    - name: Organize Files (ファイルの整理)
      id: organize
      if: steps.compile.outcome == 'success' && !cancelled()
      run: |
        cd openwrt/bin/targets/*/*
        FIRMWARE_FILE=$(ls *sysupgrade.* 2>/dev/null | head -n 1)
        EXT="${FIRMWARE_FILE##*.}"
        ls -A | grep -v "$FIRMWARE_FILE" | xargs rm -rdf
        mv "$FIRMWARE_FILE" "${{ env.OUTPUT_FILE }}.$EXT"
        sha512sums ${{ secrets.ACCESS_SHA512SUM }} sha512sums "${{ env.OUTPUT_FILE }}.$EXT"
        ${{ secrets.ACCESS_REPACKAGE }} "${{ env.OUTPUT_FILE }}.$EXT"
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV

    - name: Upload to Artifacts (Artifactに保存)
      if: steps.organize.outcome == 'success' && env.INPUT_ARTIFACT == 'true'
      uses: actions/upload-artifact@main
      with:
        name: ${{ env.OUTPUT_FILE }}
        path: ${{ env.FIRMWARE }}

    - name: Upload to Release (Releaseに公開)
      if: steps.compile.outcome == 'success' && env.INPUT_RELEASE == 'true'
      uses: softprops/action-gh-release@main
      with:
        token: ${{ secrets.ACCESS_TOKEN }}
        tag_name: ${{ env.FILE_DATE }}
        name: ${{ env.TARGET_CHIP }}_${{ env.DEVICE_NAME }}_${{ env.TARGET_DISK }}_${{ env.KERNEL_VERS }}_${{ env.FILE_DATE }}
        files: ${{ env.FIRMWARE }}/*
        body: |
          **本ファームウェアは、CPU「${{ env.TARGET_CHIP }}」搭載のモデル「${{ env.DEVICE_NAME }}」✅ ${{ env.TARGET_DISK }} ✅専用です。**
          ### 📒「${{ env.SOURCE_CODE }}」のソースコードを基にビルドされました。
          - 🖥️ 対応機種: ${{ env.DEVICE_NAME }}
          - 💿 容量仕様: ${{ env.TARGET_DISK }}
          - 🐧 カーネル: ${{ env.KERNEL_VERS }}
          - 👤 ソース名: ${{ env.SOURCE_CODE }}
          - 🌲 ソース元: ${{ env.PONLY2410_K66_REPO_TREE }}
          - 🌿 ブランチ: ${{ env.PONLY2410_K66_REPO_HEAD }}
          - 🔗 管理ＩＰ: 192.168.***.1 または ${{ env.SOURCE_CODE }}.lan
          - 🛡️ 初期パス: ********
          ### ⚠️ 免責事項 ⚠️
          - ‼️ **本ファームウェアは、個人利用を目的とした非公式のカスタマイズ版です。**
          - ⛔️ **強制フラッシュ等でデバイスが破損した場合、本リポジトリは一切の責任を負いません。自己責任で使用してください。**

    - name: Final Report & TG Notify (総合ステータス通知)
      if: always() && env.INPUT_NOTIFY == 'true'
      run: |
        get_stat() { [ "$1" == "true" ] && echo "✅" || echo "⏺️"; }
        
        [ "${{ steps.compile.outcome }}" == "success" ] && BUILD_STAT="✅ビルドが正常に完了しました！✅" || BUILD_STAT="❌ ビルドが失敗しました！ ❌"
        
        STAT_LIST="•⚙️配置复元: $(get_stat "${{ github.event.inputs.restore_config }}")%0A"
        STAT_LIST="${STAT_LIST}•🛜信号增幅: $(get_stat "${{ github.event.inputs.boost_wifi_5g }}")%0A"
        STAT_LIST="${STAT_LIST}•💾构建成果: $(get_stat "${{ github.event.inputs.upload_firmware }}")%0A"
        STAT_LIST="${STAT_LIST}•🚀公开配信: $(get_stat "${{ github.event.inputs.upload_release }}")%0A"
        STAT_LIST="${STAT_LIST}•🧹缓存清理: $(get_stat "${{ github.event.inputs.clean_ccache }}")"

        MSG="${BUILD_STAT}"
        MSG="${MSG}%0A＝＝＝＝＝  基 本 情 報 ＝＝＝＝＝＝"
        MSG="${MSG}%0A•🖥️対応機種:%0A　%20　${DEVICE_NAME}"
        MSG="${MSG}%0A•💿容量仕様:%0A　%20　${TARGET_DISK}"
        MSG="${MSG}%0A•🐧カーネル:%0A　%20　${KERNEL_VERS}"
        MSG="${MSG}%0A•👤ソース名:%0A　%20　${SOURCE_CODE}"
        MSG="${MSG}%0A•🌲ソース元:%0A　%20　${PONLY2410_K66_REPO_TREE}"
        MSG="${MSG}%0A•🌿ブランチ:%0A　%20　${PONLY2410_K66_REPO_HEAD}"

        MSG="${MSG}＝＝＝＝＝ 状 態 一 覧 ＝＝＝＝＝＝%0A${STAT_LIST}%0A"
        MSG="${MSG}＝＝＝＝＝ 結 果 情 報 ＝＝＝＝＝＝%0A"
        
        if [ "${{ steps.compile.outcome }}" == "success" ]; then
          MSG="${MSG}•📦文件: ${OUTPUT_FILE}"
        else
          MSG="${MSG}•❌失敗時刻: $(date +'%Y-%m-%d %H:%M')"
        fi

        curl -s -o /dev/null -X GET "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_KEY }}/sendMessage" \
          -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d text="$(echo "$MSG" | sed 's/ /%20/g')"

    - name: Delete Old Workflows (古いワークフローの削除)
      uses: Mattraks/delete-workflow-runs@main
      with:
        token: ${{ secrets.ACCESS_TOKEN }}
        repository: ${{ github.repository }}
        retain_days: 0
        keep_minimum_runs: 1
        delete_workflow_pattern: Build_cmcc_xr30-emmc_annawrt-24.10ss-k6.6.yml
 
    - name: Delete Old Releases (古いリリースの削除)
      if: steps.compile.outcome == 'success' && env.INPUT_RELEASE == 'true'
      uses: dev-drprasad/delete-older-releases@master
      with:
        keep_latest: 3
        delete_tags: true
        delete_tag_pattern: "${{ env.TARGET_CHIP }}_${{ env.DEVICE_NAME }}_${{ env.TARGET_DISK }}_${{ env.KERNEL_VERS }}" 


